name: ncrawler-report-grafana
goal: |
  Land the Grafana Report Builder per /home/user/code/rust/ncrawler/REPORT.md:
  a new deterministic offline builder `report-grafana` (alongside the
  existing `report-md`) plus the artifact-side changes it depends on
  (instance sidecar, shared dashboard selector, multi-dashboard scrape,
  default-on redaction). Two-phase remains the rule - the report is a
  pure renderer over data already on disk. The deep brief lives at
  /home/user/code/rust/ncrawler/REPORT.md (design, locked) and the
  v1 contract it builds on lives at
  /home/user/code/rust/ncrawler/SCOPE.md (still authoritative for the
  artifact / Item / Asset shapes and the no-`spider_chrome` / no-daemon
  / OSS-only / chrono-not-time invariants). Where REPORT.md and SCOPE.md
  conflict, SCOPE.md wins and REPORT.md gets a diff in the same stage;
  deviations from either doc must be ratified at the next REVIEW gate.

stages:
  - "stage 1 - instance sidecar + reader fallback: in crates/scrapers/ncrawler-grafana introduce a per-instance sidecar artifact written once per scrape run to <store>/grafana/_instance/<host>/<rfc3339-utc>__instance/instance.json with the per-(source,target=`_instance:<host>`) `latest` symlink rewrite, 0700 perms, and `schema_version=1` reusing the existing on-disk store machinery in ncrawler-core (do NOT fork a second store); the sidecar carries `search` (full `/api/search` inventory: title/uid/folder/tags), `datasources` (`/api/datasources`: type, default flag - persist what is already fetched for query resolution and discarded today), `instance` (`/api/health` + `/api/frontend/settings`: version, edition, rendererAvailable), and `folders` (`/api/folders` for the sidebar tree); stop embedding the full `meta.search` inventory in every per-dashboard artifact going forward (per-dashboard `meta` keeps only `dashboard` + `annotations`); add a reader API to ncrawler-core that resolves `(host, uid) -> InstanceFacts` by first reading the `_instance/<host>/latest` sidecar and ONLY falling back to a per-dashboard artifact's legacy `meta.search` when no sidecar is present (migration grace), with the fallback path emitting a tracing::warn at load time naming the legacy artifact; SSRF allow-host validation continues to gate every endpoint at scrape time; wiremock-backed unit tests for sidecar write + read + the legacy-meta fallback + a mixed-store scenario (some artifacts new, some legacy); golden-file tests asserting the sidecar JSON shape is stable across runs; cargo build/clippy/fmt/test --workspace green; live-net tests gated on RUN_LIVE_TESTS=1 and not run by default"
  - "REVIEW the sidecar contract before any later stage depends on it - confirm the on-disk layout (`grafana/_instance/<host>/...` vs `grafana/<uid>/...`) is the right shape against ncrawler-core's per-(source,target) `latest` semantics, that `schema_version`'s major-version reject-on-read policy correctly covers the new sidecar kind (not just per-dashboard artifacts), that the InstanceFacts reader's legacy-meta fallback never silently disagrees with a present sidecar (sidecar wins, fallback path is reachable only when the sidecar is absent), that dropping `meta.search` from per-dashboard artifacts does not break ncrawler-report-md's existing golden tests (the rendered output for a single-dashboard fixture must be byte-identical before/after this stage), and that the chosen host normalisation (lowercase, port included, scheme stripped) round-trips through `safe()` for `target=`_instance:<host>``; surface any SCOPE.md or REPORT.md amendments needed before stage 3 fans out the selector"
  - "stage 2 - shared selector (scrape + report): in crates/scrapers/ncrawler-grafana (or a new shared `crates/scrapers/ncrawler-grafana/src/selector.rs` so the report builder can consume it without a circular dep) introduce a `DashboardSelector` parser that accepts `--all`, `--uid a,b,c` (comma-list, repeatable), `--name <substring>` (case-insensitive title match), `--folder <name>`, `--tag <t>`, `--limit N` and resolves against either `/api/search` live (scrape time) or the on-disk `_instance/<host>/latest` sidecar (report time); document and enforce the dual-`--all` semantics from REPORT.md \u00a72 - at scrape time `--all` is the live inventory (1000+ possible), at report time `--all` is only what is actually on disk, and the report records BOTH counts in its header AND emits a tracing::warn when on-disk coverage is narrower than the sidecar inventory; reject `--limit 0` and `--limit > 10_000` (safety bound); wire the selector into the existing `ncrawler scrape grafana` CLI replacing the single `--uid` argument WITHOUT breaking the existing flag (treat the old `--uid <single>` as the singleton case of the new `--uid <comma-list>`); unit tests for every selector permutation + the live-vs-on-disk divergence path + the safety bounds; no live-net needed for selector tests; cargo build/clippy/fmt/test --workspace green"
  - "stage 3 - multi-dashboard scrape: in crates/scrapers/ncrawler-grafana extend the API-mode scrape loop so a single `ncrawler scrape grafana` invocation iterates the resolved DashboardSelector over `/api/search`, writes one per-dashboard artifact per resolved uid (existing per-`<uid>/latest` layout from stage 2 of ncrawler-v1), and emits the `_instance` sidecar exactly once at the start (or refreshes it if the existing sidecar is older than the scrape's wall-clock cap); bounded concurrency (configurable, default 4) with a token bucket so a `--all` run cannot DoS the upstream; per-dashboard errors are collected and surfaced in a final summary but do NOT abort sibling dashboards (a 401 on one uid still lets the rest succeed); the token-quarantine rules from SCOPE.md still hold (bearer token via starter-secrets-* keyed `ncrawler:grafana:<host>:token`, env fallback `GRAFANA_TOKEN`, never logged); wiremock tests for the multi-dashboard loop (mix of 200/401/404/malformed-JSON responses), a concurrency cap test that asserts the limiter actually limits, and a sidecar-skip test (existing fresh sidecar => not refetched); live smoke test gated on `RUN_LIVE_TESTS=1` runs `--all --limit 5` against the docker-compose Grafana fixture; cargo build/clippy/fmt/test --workspace green"
  - "stage 4 - shared redaction pass (default-on): introduce a shared `Redactor` in ncrawler-spi (or a small `ncrawler-redact` crate if it would otherwise pull starter deps into spi) that masks variable values and SQL literals matching secret-ish patterns (long hex 32+, uuid v4, `password\\s*=\\s*'...'`, `secret\\s*=\\s*'...'`, `key\\s*=\\s*'...'`, bearer-token-shaped strings); the API is `Redactor::redact(text) -> Cow<str>` (no allocation in the no-match path) and `Redactor::redact_variables(&mut HashMap<String,String>)`; wire the masker as a builder-side pass invoked by the renderers (NOT at scrape time - the artifact stays raw on disk for audit/forensics, and the SCOPE-mandated 0700 perms remain the on-disk defence); rewire ncrawler-report-md to apply the redactor before emitting; the CLI gains `--redact` (default on) / `--no-redact` (explicit opt-out, logs a WARN on use); reuse the existing `starter_ai::secret`-style wrapper machinery wherever a string is known-secret at the type level rather than pattern-matched at the end; property-test the redactor with a quickcheck-style harness asserting (a) every documented secret pattern is masked, (b) non-secret text round-trips byte-identically (no false positives on common SQL identifiers / column names from real Grafana panels), (c) `--no-redact` is a true bypass (no double-masking); cargo build/clippy/fmt/test --workspace green"
  - "REVIEW the redaction pass before the report builder ships it to disk by default - confirm the masker catches every pattern listed in REPORT.md \u00a77 against a representative fixture set drawn from the `rd-esr` artifacts under runs/ (variables, `rawSql`, returned data frames), that no false-positive masking corrupts plain column names / common SQL identifiers / Grafana variable names like `${__from}`, that the `--no-redact` opt-out logs a clearly attributable WARN that survives in the persisted Event stream for forensics, that no secret value (bearer token, host UUID, tenant id observed in the live instance) appears in the rendered output for the default-on case, and that the underlying artifact-layer exposure flagged in REPORT.md \u00a77 (scrape persists `rawSql`/variables/data plaintext under 0700) is documented in the closing handover as a follow-up rather than silently fixed in this stage"
  - "stage 5 - report-grafana builder (overview + full, no audit): create crates/builders/ncrawler-report-grafana with the new `Builder` impl following the SCOPE.md `Builder` trait; the build entry point takes the `_instance/<host>/latest` sidecar plus a list of per-dashboard artifact dirs (extend BuildCtx if it is single-artifact today - the extension is its own commit with a `schema_version` note when it touches the SPI); render the three REPORT.md sections (1. Overview from the sidecar: URL, version, edition, datasources, dashboard count / folder count, renderer plugin availability; 2. Structure: folder tree, '0. Navigation' dashlist if present, tag index, panel-type distribution, datasource usage map; 3. Pages: one block per selected dashboard with title/uid/folder/panel count/variable count/datasource + the variables table redacted-by-default + the panels table sorted by panel id); `--mode overview|full` (default `overview`), `--data` (default off), `--redact`/`--no-redact` (default on), `--window now-30d..now` (default `now-6h` per REPORT.md), `--all`/`--uid`/`--name`/`--folder`/`--tag`/`--limit` via the stage-2 shared selector resolved against the on-disk store; stable ordering is mandatory - pages sort (folder, title, uid), panels sort by panel id, tags/folders lex - so re-renders diff cleanly; in `full` mode emit per-panel **template SQL** (raw `rawSql` from `meta.dashboard`, deterministic, with un-resolved `$variables` shown verbatim); when `--data` is on, additionally emit per-panel **executed SQL** (`results.<refId>.meta.executedQueryString` from the query response, only present where the datasource exposes it - postgres/mysql yes, grafana-rubix-os-data-source no, never invented) and a sample of returned rows clipped to the smaller of (10 rows, 4 KiB pretty-printed JSON); the report writes `REPORT.md` next to the *_instance* sidecar's `latest` and embeds the metadata header from REPORT.md \u00a74 verbatim (mode, data on/off, window, scope description, on-disk-vs-inventory counts, redacted flag); CLI wires `ncrawler build report-grafana [--store <store-dir>] [--mode ...] [--data] [--window ...] [--redact|--no-redact] [--all|--uid|--name|--folder|--tag|--limit ...]`; golden-file tests under crates/builders/ncrawler-report-grafana/tests/fixtures/ for (a) overview-only single dashboard, (b) full-no-data multi-dashboard with template SQL, (c) full-with-data covering a SQL datasource (executed SQL present) AND a non-SQL datasource (executed SQL absent, NOT faked); cargo build/clippy/fmt/test --workspace green"
  - "stage 6 - audit mode + duplicate fingerprinting: extend ncrawler-report-grafana with `--mode audit` that reads frozen response/error frames straight from the per-dashboard artifacts (per REPORT.md \u00a75 audit is offline - it must NOT issue any live HTTP, and a test asserts the audit path uses no `reqwest::Client`); ship the seven check classes from REPORT.md \u00a75: dead datasource references (panel.datasource not in `_instance` datasources list); broken queries (error frames in the stored response); empty panels (queries that ran and returned 0 rows); duplicate dashboards keyed on `blake3` over a normalised `(panels[], targets[], variables[])` projection (NOT title similarity - test must give two dashboards identical titles to prove fingerprint-only matching, mirroring the SCOPE.md item_id-only Asset linkage discipline); orphans (no folder, untagged); unused datasources (in `_instance` datasources, referenced by no panel across the scraped artifacts); blank/constant variables (constants left empty, hardcoded values that should be variables); each finding carries (severity: info|warn|error, source artifact path, dashboard uid + title, panel id + title where applicable, human-readable message); audit-mode output renders as a sorted findings table grouped by severity, deterministic ordering; fixture-driven tests for each check class against synthetic artifacts that exercise both the present + absent paths; cargo build/clippy/fmt/test --workspace green; cargo tree -e normal still shows a single browser stack and no spider_chrome anywhere"
