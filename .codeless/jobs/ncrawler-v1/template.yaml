name: ncrawler-v1
goal: |
  Land ncrawler v1: a modular two-phase (scrape -> build) toolkit with
  Grafana (API + renderer-plugin visuals) and arbitrary-page scrapers,
  a deterministic Markdown report builder, and an AI report builder
  wired to starter-ai::ClaudeRunner + starter-skills. OSS-only deps,
  daemon-free default path, dep versions aligned with the sibling
  starter workspace. The authoritative brief lives at
  /home/user/code/rust/ncrawler/SCOPE.md and is locked; deviations
  require updating that doc first and surfacing at the next REVIEW
  gate.

stages:
  - "stage 1 - skeleton + SPI contract: create the virtual Cargo workspace under /home/user/code/rust/ncrawler, scaffold the v1 crates (ncrawler-spi, ncrawler-core, ncrawler-cli; empty placeholders for crates/scrapers/ncrawler-grafana, crates/scrapers/ncrawler-spider, crates/builders/ncrawler-report-md, crates/builders/ncrawler-report-ai, crates/builders/ncrawler-vector) and the top-level skills/ directory; in ncrawler-spi define ARTIFACT_SCHEMA_VERSION = 1, Artifact / Item / ItemKind / Asset (Asset.item_id: Option<String> per the SCOPE Asset-Item linkage rule) / Scraper / Builder / ScrapeJob / BuildCtx / ScrapeError / BuildError; re-export Cancel from starter_spi::ai::Cancel; in ncrawler-core implement the on-disk artifact store with timestamped dirs (<rfc3339-utc>__<source>__<safe(target)>), the per-(source,target) `latest` symlink rewrite, 0700 perms, dirname-is-the-index `ls --since` parsing, and the JSON read/write round-trip rejecting unknown major schema versions; in ncrawler-cli set up the clap-derive shell with `scrape`, `build`, `ls`, `show` subcommands where `ls` and `show` operate end-to-end against an empty store and `scrape` / `build` print a not-yet-implemented stub keyed by source/builder name; pin tokio / reqwest / serde / chrono / clap to the same versions as the sibling starter workspace; cargo build --workspace + cargo clippy --workspace --all-targets -- -D warnings + cargo fmt --check + cargo test --workspace all green; record cargo tree -e normal output in handover showing single versions of tokio, reqwest, serde, chrono, clap"
  - "REVIEW the SPI contract before any scraper depends on it - confirm Artifact / Item / Asset shapes are right, the per-source Item-id stability rule documented in SCOPE.md (grafana -> panel-{panelId}, spider -> page-{blake3(normalised_url)[..16]}) is honoured by the API the scraper will use, Asset.item_id is the only Item<->Asset link (label-matching forbidden), schema_version policy correctly rejects unknown majors on read, the on-disk layout + `latest` symlink semantics behave the way SCOPE.md describes against the empty-store `ls`/`show` path, and the meta best-effort rule is enforceable by the read API"
  - "stage 2 - Grafana API scraper + Markdown builder: in crates/scrapers/ncrawler-grafana wire the pinned `grafana = =0.1.3` crate behind a GrafanaClient trait that lives in client.rs (so the dep is replaceable in one file), implement api.rs for mode=Api (GET /api/dashboards/uid/{uid} via client.dashboards(), POST /api/ds/query via the generated wrapper with a client.raw() fallback documented inline, GET /api/search + /api/annotations via client.openapi()), produce one Item::Panel per panel with deterministic id `panel-{panelId}`, attach dashboard JSON in meta, source the bearer token via starter-secrets-file / starter-secrets-keyring keyed `ncrawler:grafana:<host>:token` with env fallback GRAFANA_TOKEN and never log it, enforce SSRF allow-host validation at scrape time against any datasource URL surfaced by /api/ds/query; ship wiremock-backed unit tests for every endpoint (success + 401 + 404 + malformed JSON + SSRF reject); leave visual.rs and merge.rs as placeholder modules returning ScrapeError::ModeUnsupported so the file layout is established without the Visual code yet; in crates/builders/ncrawler-report-md render the artifact to Markdown deterministically with per-Item sections (title, tags, fenced JSON for data) and image embeds for Assets matched by item_id (asserted by a test that gives two assets identical labels to prove label-matching is dead); golden-file tests under crates/builders/ncrawler-report-md/tests/fixtures/ for a multi-panel Grafana artifact; cargo build/clippy/fmt/test --workspace green; live-net tests gated on RUN_LIVE_TESTS=1 and not run by default"
  - "stage 3 - AI report builder + first skill: in crates/builders/ncrawler-report-ai compose the pipeline (render via ncrawler-report-md to produce the prompt body -> resolve a SkillSelector match from starter-skills against the artifact's source + tags -> Registry::with_defaults() -> Provider::Claude -> ClaudeRunner::run streaming Events) wired through starter-ai with only `provider-claude` enabled, persist the assistant's text to `build-report-ai.md` and the streamed Event log to `build-report-ai.jsonl` next to the artifact, propagate cancellation from the CLI through starter_spi::ai::Cancel, route secrets through starter_ai::secret-style wrappers so they never appear in events or logs; create skills/grafana-triage/SKILL.md as a real bundle (frontmatter with deny_unknown_fields-clean keys, system prompt focused on anomaly + threshold + correlation summary across panels, resources referenced explicitly) and verify starter-skills' blake3 content-hash quarantine succeeds on load; unit tests for the selector match path against a mock SkillRegistry + a mock ClaudeRunner that emits a scripted Event stream; an `#[ignore]` integration test that hits a real `claude` binary on disk under RUN_LIVE_TESTS=1 to confirm end-to-end streaming + cancellation + secret-redaction; cargo build/clippy/fmt/test --workspace green"
  - "REVIEW the AI builder + skill plumbing before adding visual + spider complexity - confirm against a live Claude CLI run that event streaming + cancellation + secret handling + skill hash quarantine + the persisted build-report-ai.md / .jsonl all behave per SCOPE.md, that the SkillSelector picks the right skill for a Grafana artifact, and that no token appears anywhere in the captured Event log or test fixtures; surface any SCOPE.md amendments needed before stage 4 fans out"
  - "stage 4 - Grafana Visual/Both modes + Spider scraper: in crates/scrapers/ncrawler-grafana flesh out visual.rs to drive the renderer plugin (`/render/d-solo/{uid}/...?panelId=N&width=&from=&to=`) via the hand-rolled reqwest::Client kept in client.rs (the `grafana` crate covers `/api/` only), write each rendered PNG to assets/ with Asset.item_id linked to its panel's Item.id, return ScrapeError::RendererPluginMissing when the plugin probe fails, and gate the best-effort chromiumoxide-driven fallback behind the explicit `--visual-fallback chrome` CLI flag with a flaky-path warning logged at startup; flesh out merge.rs for mode=Both producing one Item per panel with its matching PNG Asset; in crates/scrapers/ncrawler-spider depend on the open-source `spider` crate with `default-features = false` (no `chrome` and no `smart` features - cargo tree -e normal must NOT show spider_chrome), map each spider::page::Page to Item::Page with id `page-{blake3(normalised_url)[..16]}`, extract readable text via dom_smoothie and an optional Markdown rendering via fast_html2md, enforce SSRF allow-host validation at scrape time on every URL followed, leave JS rendering to our own chromiumoxide layer at crates/scrapers/ncrawler-spider/src/chrome.rs (the future starter-headless promotion candidate) opted into via `--render-js`, with Chrome binary discovery following the documented NCRAWLER_CHROME -> which -> well-known-paths chain and the NCRAWLER_CHROME_NO_SANDBOX opt-out logged WARN; wiremock + golden tests for the Grafana renderer + merge code paths; live-net + headless-Chrome tests gated on RUN_LIVE_TESTS=1; cargo build/clippy/fmt/test --workspace green; cargo tree -e normal recorded in handover showing single browser stack"
  - "stage 5 (stretch) - Vector builder: in crates/builders/ncrawler-vector define Embedder and VectorStore traits, ship the default Embedder backed by fastembed-rs (ONNX, no network) and the default VectorStore backed by lancedb (in-process, single directory on disk, Apache-2.0), and a feature-gated `store-qdrant` VectorStore impl via qdrant-client (NOT default precisely because it requires a server, per the daemon-free goal); chunk Items into embedding-sized pieces, upsert keyed on (source, target, item_id) so re-scrapes of the same target overwrite rather than duplicate (relies on the per-source stable Item-id contract from stage 1); CLI wires `ncrawler build vector <artifact-dir> [--store lance://./vec | qdrant://...]` with lance as the default URI; unit tests cover chunking + upsert idempotency against an in-memory VectorStore mock; integration test against a real LanceDB directory under RUN_LIVE_TESTS=1; cargo build --workspace and `cargo build --workspace --features store-qdrant` both green; cargo clippy/fmt/test --workspace green"
